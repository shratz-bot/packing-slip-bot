name: Generate eBay Packing Slips

on:
  schedule:
    # Runs every 15 minutes
    - cron: "*/15 * * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  generate-slips:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libpangocairo-1.0-0 \
            libcairo2 \
            libgdk-pixbuf2.0-0 \
            libffi-dev \
            shared-mime-info

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run packing slip generator
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID:              ${{ secrets.SPREADSHEET_ID }}
          DRIVE_FOLDER_ID:             ${{ secrets.DRIVE_FOLDER_ID }}
          EBAY_LOGO_FILE_ID:           ${{ secrets.EBAY_LOGO_FILE_ID }}
          SHRATZ_LOGO_FILE_ID:         ${{ secrets.SHRATZ_LOGO_FILE_ID }}
          WHATNOT_QR_FILE_ID:          ${{ secrets.WHATNOT_QR_FILE_ID }}
          DRIVE_OWNER_EMAIL:           ${{ secrets.DRIVE_OWNER_EMAIL }}
        run: python generate_packing_slips.py
